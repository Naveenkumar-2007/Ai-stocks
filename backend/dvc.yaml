stages:
  train_v2_drift_gated:
    desc: "Drift-gated daily training for mlops_v2 (retrain only when needed)"
    cmd: python -m mlops_v2.run_daily_training
    deps:
      - mlops_v2/run_daily_training.py
      - mlops_v2/training.py
      - mlops_v2/drift.py
      - mlops_v2/feature_engineering.py
      - mlops_v2/data_ingestion.py
      - mlops_v2/validation.py
      - mlops/stocks.json
      - src/components/data_ingestion.py
      - src/components/data_transformation.py
      - src/components/model_trainer.py
    outs:
      - mlops_v2/models:
          persist: true
      - data/raw:
          persist: true
    metrics:
      - monitoring/reports:
          cache: false

  train_v2_monthly_full:
    desc: "Monthly full retraining on complete history for mlops_v2"
    cmd: python -m mlops_v2.run_monthly_full_retrain
    deps:
      - mlops_v2/run_monthly_full_retrain.py
      - mlops_v2/training.py
      - mlops_v2/drift.py
      - mlops_v2/feature_engineering.py
      - mlops_v2/data_ingestion.py
      - mlops_v2/validation.py
      - mlops/stocks.json
  train_v2_weekly_tuning:
    desc: "Weekly hyperparameter tuning for mlops_v2 using Optuna and Sharpe objective"
    cmd: python -m mlops_v2.run_weekly_tuning
    deps:
      - mlops_v2/run_weekly_tuning.py
      - mlops_v2/tuning.py
      - mlops_v2/feature_engineering.py
      - mlops_v2/data_ingestion.py
      - mlops/stocks.json
    metrics:
      - monitoring/tuning/latest.json:
          cache: false

  train_all:
    desc: "Train all stocks from mlops/stocks.json and track aggregate metrics"
    cmd: python -m mlops.train_all_stocks --epochs ${train.epochs} --batch-size ${train.batch_size} --days ${train.days} --max-stocks ${train.max_stocks} --start-from ${train.start_from} --clean-start
    deps:
      - mlops/training_pipeline.py
      - mlops/train_all_stocks.py
      - mlops/registry.py
      - mlops/config.py
      - mlops/stocks.json
      - src/components/data_ingestion.py
      - src/components/data_transformation.py
      - src/components/model_trainer.py
    params:
      - params.yaml:
          - train.epochs
          - train.batch_size
          - train.days
          - train.max_stocks
          - train.start_from
    outs:
      - mlops/model_registry:
          persist: true
      - mlruns:
          persist: true
    metrics:
      - mlops/metrics/summary.json:
          cache: false
      - mlops/metrics/all_stocks_metrics.json:
          cache: false
